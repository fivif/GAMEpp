name: Build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Download sing-box
        run: |
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v1.13.14/sing-box-1.13.14-windows-amd64.zip" -o sing-box.zip
          7z x sing-box.zip -osing-box-tmp -y
          mkdir -p src-tauri\bin
          Get-ChildItem -Path sing-box-tmp -Recurse -Filter sing-box.exe | Move-Item -Destination src-tauri\bin\sing-box.exe -Force
        shell: pwsh
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GAME++ ${{ github.ref_name }}'
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - name: Download sing-box
        run: |
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v1.13.14/sing-box-1.13.14-darwin-arm64.tar.gz" -o sing-box.tar.gz
          mkdir -p sing-box-tmp && tar xzf sing-box.tar.gz -C sing-box-tmp
          mkdir -p src-tauri/bin
          find sing-box-tmp -name sing-box -type f -exec cp {} src-tauri/bin/sing-box \;
          chmod +x src-tauri/bin/sing-box
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GAME++ ${{ github.ref_name }}'
          prerelease: false
