<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c0a20"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bolt2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.15"/>
  <circle cx="256" cy="240" r="160" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.1"/>

  <!-- Lightning bolt - main -->
  <path d="M280 100 L180 260 L240 260 L210 400 L340 220 L270 220 L310 100 Z"
        fill="url(#bolt)" stroke="url(#bolt2)" stroke-width="4" stroke-linejoin="round"/>

  <!-- Speed lines -->
  <g opacity="0.3" stroke="#a78bfa" stroke-width="3" stroke-linecap="round">
    <line x1="360" y1="140" x2="420" y2="120"/>
    <line x1="370" y1="170" x2="440" y2="165"/>
    <line x1="365" y1="200" x2="430" y2="210"/>
  </g>
</svg>
